# Auto-resolves all replicas of the baileys-worker service by DNS.
# Docker's internal DNS returns all IPs for the service name.
upstream baileys_workers {
    # Distribute to the same worker based on X-Session-Id to maintain session state
    hash $route_key consistent;

    # Docker Compose service DNS resolves to all replica IPs.
    # resolver 127.0.0.11 handles dynamic scaling without nginx reload.
    server baileys-worker:21465;

    keepalive 32;
}
